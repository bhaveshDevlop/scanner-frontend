<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

  #authOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; justify-content:center; align-items:center; z-index:9999; }
#authBox { background:white; padding:30px; border-radius:16px; width:90%; max-width:320px; text-align:center; }
#authBox input { text-align:center; font-size:18px; }
#authError { color:#ef4444; font-size:13px; margin-top:8px; min-height:16px; }


  body{font-family:'Segoe UI', sans-serif; margin:0; background:#f4f6f9; color: #333; padding: 20px;}
  .header-box { display:flex; justify-content:center; align-items:center; gap: 20px; margin-bottom: 30px; position: relative; flex-wrap: wrap; }
  .container{display:flex; flex-wrap:wrap; max-width: 1000px; margin: 0 auto; gap: 20px;}
  .section{flex:1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-width: 300px; position: relative;}
  button{padding:12px 18px; border:none; border-radius:8px; cursor:pointer; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 10px;}
  .primary{background:#2563eb; color:#fff}
  .secondary{background: #10b981; color: white;}
  
  .search-bar { display:flex; gap:5px; background: white; padding: 5px; border-radius: 10px; border: 1px solid #ddd; }
  .search-bar input { border:none; outline:none; padding: 8px; width: 180px; }
  .search-bar button { margin:0; width:auto; padding: 8px 15px; }

  #searchView { display:none; height: 85vh; max-width: 1100px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; flex-direction: column; border: 1px solid #e2e8f0; }

  .card{background:#f8fafc; padding:10px; border-radius:8px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #e2e8f0; font-size: 13px; gap: 10px;}
  .delete-deal{background:#ef4444; color:#fff; padding: 6px 10px; width: auto; margin: 0; font-size: 11px; flex-shrink: 0;}
  
  .deal-link { color: #2563eb; text-decoration: none; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; font-size: 12px; }
  .deal-link:hover { text-decoration: underline; }

  .popup{position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.6); display:none; justify-content:center; align-items:center; z-index: 1000;}
  .popup-content{background:#fff; padding:30px; width:90%; max-width:450px; border-radius:16px; position: relative;}
  input, select, textarea{width:100%; padding:12px; margin-top:10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit;}
  
  .emoji-bar { position: absolute; top: 20px; right: 25px; display: flex; gap: 6px; background: #f1f5f9; padding: 5px 10px; border-radius: 20px; border: 1px solid #cbd5e1; }
  .emoji-item { cursor: pointer; font-size: 18px; user-select: none; transition: 0.1s; }
  .emoji-item:hover { transform: scale(1.3); }

  .shortener-box { display: flex; align-items: center; margin-top: 12px; font-size: 14px; gap: 8px; background: #f8fafc; padding: 8px; border-radius: 8px; border: 1px dashed #cbd5e1; }
  .shortener-box input { width: auto; margin: 0; }
</style>


</head>
<body>

<div id="authOverlay">
  <div id="authBox">
    <h3 style="margin-top:0;">🔒 Enter Password</h3>
    <input type="password" id="authInput" placeholder="Password" onkeydown="if(event.key==='Enter') checkAuth()">
    <button class="primary" onclick="checkAuth()">Unlock</button>
    <div id="authError"></div>
  </div>
</div>

<div class="header-box" id="mainHeader">
  <h2 style="margin:0;">🚀 Anomaly Scanner Pro</h2>
  <div class="search-bar">
    <input type="text" id="topSearchInput" placeholder="Search Google...">
    <button class="primary" onclick="openSearchPage()">Search</button>
  </div>
</div>

<div id="dashboardView" class="container">
  <div class="section">
<select id="targetChannel" style="position:absolute; top:15px; right:15px; width:auto; padding:5px;" onchange="loadRecentDeals()">
  <option value="Main">Main Channel</option>
  <option value="Loot">Loot Channel</option> <option value="Test">Test Channel</option>
</select>
    <h3>Post Content</h3>
    <button class="primary" onclick="openPopup()">+ Create New Post</button>
    <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; font-weight: bold; color: #475569; font-size: 14px;">Recent Deals (Max 5)</div>
    <div id="recentDealsList" style="margin-top: 10px;">Loading...</div>
  </div>
  <div class="section">
    <h3>Tracking Sites</h3>
    <button class="secondary" onclick="addSite()">+ Add New Site</button>
    <div id="sites" style="margin-top: 15px;"></div>
  </div>
</div>

<div id="searchView">
  <div style="padding: 12px; background: #f1f5f9; display: flex; align-items: center; gap: 15px;">
    <button onclick="closeSearchPage()" style="width:auto; margin:0; background:#475569; color:white; padding: 8px 20px;">← Back</button>
    <span id="searchStatus" style="font-weight:600;"></span>
  </div>
  <iframe id="searchFrame" style="width:100%; height:100%; border:none;"></iframe>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <div class="emoji-bar">
      <span class="emoji-item" onclick="insertEmoji('🔥')">🔥</span>
      <span class="emoji-item" onclick="insertEmoji('✅')">✅</span>
      <span class="emoji-item" onclick="insertEmoji('➡️')">➡️</span>
      <span class="emoji-item" onclick="insertEmoji('🎁')">🎁</span>
      <span class="emoji-item" onclick="insertEmoji('💯')">💯</span>
      <span class="emoji-item" onclick="insertEmoji('👉')">👉</span>
    </div>
    <h3>Post Details</h3>
<select id="dealType" onchange="saveCurrentState(); renderFields();">
  <option value="Instant">Instant Deal</option>
  <option value="Scheduled Deals">Scheduled Deal</option>
  <option value="Offers">Special Offer</option>
  <option value="Simple Message">Simple Message</option>
  <option value="Send Proofs">Send Proofs</option> </select>
    </select>
    <div id="fields"></div>
    <div style="display:flex; gap: 10px; margin-top: 20px;">
      <button class="primary" id="sendBtn" onclick="submitDeal()">Send</button>
      <button onclick="closePopup()" style="background:#e2e8f0;">Cancel</button>
    </div>
  </div>
</div>

<script>
const SITE_PASSWORD = "icpc"; // <-- change this

function checkAuth() {
  const input = document.getElementById("authInput").value;
  if (input === SITE_PASSWORD) {
    localStorage.setItem("scannerAuth", "true");
    document.getElementById("authOverlay").style.display = "none";
  } else {
    document.getElementById("authError").innerText = "Wrong password.";
  }
}

if (localStorage.getItem("scannerAuth") === "true") {
  document.getElementById("authOverlay").style.display = "none";
}

let lastInputValues = { title: "", imageUrl: "", price: "", siteLink: "", offerTitle: "", offerDetails: "", offerLink: "", offerImageUrl: "", simpleMessage: "", scheduleTime: "" };

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwl9MpIjNGcG1RLhGoOoqcpcJVI5LTH3p7UM4Gac9MYsNxnfSwm8n2dWD728ZQimZ6f/exec"; // from Step A below

function callAppsScript(fn, params = []) {
  return fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight issues
    body: JSON.stringify({ fn, params })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) throw new Error(data.error);
    return data.result;
  });
}

let activeInputId = null;

function trackFocus(e) { activeInputId = e.target.id; }

function insertEmoji(emoji) {
  if (!activeInputId) return;
  const input = document.getElementById(activeInputId);
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
  input.focus();
  input.selectionStart = input.selectionEnd = start + emoji.length;
  saveCurrentState();
}

function openPopup(){ document.getElementById("popup").style.display="flex"; renderFields(); }
function closePopup(){ saveCurrentState(); document.getElementById("popup").style.display = "none"; }

function openSearchPage() {
  const query = document.getElementById("topSearchInput").value;
  if (!query) return;
  document.getElementById("dashboardView").style.display = "none";
  document.getElementById("mainHeader").style.display = "none";
  document.getElementById("searchView").style.display = "flex";
  document.getElementById("searchStatus").innerText = "Searching: " + query;
  document.getElementById("searchFrame").src = "https://www.google.com/search?q=" + encodeURIComponent(query) + "&igu=1";
}

function closeSearchPage() {
  document.getElementById("dashboardView").style.display = "flex";
  document.getElementById("mainHeader").style.display = "flex";
  document.getElementById("searchView").style.display = "none";
}

function toggleShortener() {
  const urlInput = document.getElementById("siteLink");
  if (urlInput.value.trim() === "") return;
  callAppsScript.withSuccessHandler((shortUrl) => {
    if (!shortUrl.startsWith("Error")) { urlInput.value = shortUrl; saveCurrentState(); }
  }).shortenUrlWithCuttly(urlInput.value);
}

function saveCurrentState() {
  ["title", "imageUrl", "price", "siteLink", "offerTitle", "offerDetails", "offerLink", "offerImageUrl", "simpleMessage", "scheduleTime"].forEach(id => { 
    const el = document.getElementById(id); if(el) lastInputValues[id] = el.value; 
  });
}

function renderFields(){
  const type = document.getElementById("dealType").value;
  const f = document.getElementById("fields");
  
  if (type === "Send Proofs") {
    // Hardcoded message UI
    f.innerHTML = `<p style="color: #15803d; background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #b91c1c; font-weight: bold; margin-top: 10px;">
      Message to be sent:<br>"Dm me @dealduniyaproffesbot Proffes"
    </p>`;
  } else if (type === "Simple Message") {
    f.innerHTML = `<textarea id="simpleMessage" placeholder="Message...">${lastInputValues.simpleMessage}</textarea><input type="text" id="imageUrl" placeholder="Image URL" value="${lastInputValues.imageUrl}">`;
  } else if (type === "Offers") {
    f.innerHTML = `<input type="text" id="offerTitle" placeholder="Offer Title" value="${lastInputValues.offerTitle}"><input type="text" id="offerImageUrl" placeholder="Offer Image URL" value="${lastInputValues.offerImageUrl}"><textarea id="offerDetails" placeholder="Offer Details">${lastInputValues.offerDetails}</textarea><input type="text" id="offerLink" placeholder="Offer Link" value="${lastInputValues.offerLink}">`;
  } else {
    // Instant or Scheduled
    f.innerHTML = `<input type="text" id="title" placeholder="Product Title" value="${lastInputValues.title}"><input type="text" id="imageUrl" placeholder="Image URL" value="${lastInputValues.imageUrl}"><input type="text" id="price" placeholder="Price" value="${lastInputValues.price}"><input type="text" id="siteLink" placeholder="Deal URL" value="${lastInputValues.siteLink}"><div class="shortener-box"><input type="checkbox" id="useShortener" onchange="toggleShortener()"><label>Shorten with Cuttly</label></div>`;
    if(type === "Scheduled Deals") f.innerHTML += `<input type="datetime-local" id="scheduleTime" value="${lastInputValues.scheduleTime}">`;
  }
  
  // Re-attach focus listeners for emojis
  f.querySelectorAll('input, textarea').forEach(el => el.addEventListener('focus', trackFocus));
}

function submitDeal(){
  const btn = document.getElementById("sendBtn");
  btn.innerText = "Processing..."; btn.disabled = true;
  saveCurrentState();
  const data = { type: document.getElementById("dealType").value, targetChannel: document.getElementById("targetChannel").value, ...lastInputValues };
  const fn = (data.type === "Scheduled Deals") ? "saveScheduledDeal" : "sendTelegramMessage";
callAppsScript(fn, [data]).then(res => {
  alert(res);
  if (String(res).startsWith("Success")) closePopup();
  btn.innerText = "Send"; btn.disabled = false; loadRecentDeals();
}).catch(err => {
  alert("Error: " + err.message);
  btn.innerText = "Send"; btn.disabled = false;
});
}

function loadRecentDeals() { callAppsScript.withSuccessHandler(renderRecentDeals).getRecentDeals(document.getElementById("targetChannel").value); }

function renderRecentDeals(data) {
  const container = document.getElementById("recentDealsList");
  if (!data || data.length === 0) { container.innerHTML = "<p style='color:gray; font-size:12px;'>Empty.</p>"; return; }
  container.innerHTML = "";
  const displayData = data.slice(0, 5); 
  displayData.forEach(deal => {
    let div = document.createElement("div"); div.className = "card";
    div.innerHTML = `<button class="delete-deal" onclick="deleteMsg('${deal[2]}', '${deal[3]}')">Delete</button><a href="${deal[1]}" target="_blank" class="deal-link" title="${deal[1]}">${deal[1] || "View"}</a>`;
    container.appendChild(div);
  });
}

function deleteMsg(mId, cId) { if(confirm("Mark Over?")) callAppsScript.withSuccessHandler(loadRecentDeals).markAsOver(mId, cId); }
function loadSites(){ callAppsScript.withSuccessHandler(renderSites).getSites(); }

function renderSites(data){
  const container = document.getElementById("sites"); container.innerHTML = "";
  data.forEach((site, index) => {
    let div = document.createElement("div"); div.className = "card";
    div.innerHTML = `<a href="${site[1]}" target="_blank" class="deal-link" style="font-weight:500;">${site[0]} ↗</a><button class="delete-deal" onclick="removeSite(${index})">Remove</button>`;
    container.appendChild(div);
  });
}

function addSite(){ let n = prompt("Name:"), u = prompt("URL:"); if(n && u) callAppsScript.withSuccessHandler(renderSites).saveSite(n, u); }
function removeSite(i){ if(confirm("Remove?")) callAppsScript.withSuccessHandler(renderSites).deleteSite(i); }

loadSites(); loadRecentDeals();
</script>
</body>
</html>
